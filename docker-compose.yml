# version: "3"
services:
  # Pulsar standalone with bug configuration
  pulsar:
    image: apachepulsar/pulsar:2.6.4
    container_name: pulsar-replication-2-6-4
    hostname: pulsar
    restart: on-failure
    environment:
      - PULSAR_MEM=-Xms512m -Xmx512m -XX:MaxDirectMemorySize=256m
    ports:
      - "6650:6650"
      - "8080:8080"
    command: >
      bash -c "
      echo 'acknowledgmentAtBatchIndexLevelEnabled=true' >> conf/standalone.conf &&
      bin/pulsar standalone
      "
    healthcheck:
      test: ["CMD", "bin/pulsar-admin", "brokers", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
